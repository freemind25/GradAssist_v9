version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
      DB_HOST: postgres
      DB_NAME: gradassist
      DB_USER: gradassist
      DB_PASSWORD: securepassword
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: gradassist
      POSTGRES_USER: gradassist
      POSTGRES_PASSWORD: securepassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradassist -d gradassist"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./devops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data: